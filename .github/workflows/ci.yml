name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: "Checkout code"
      uses: "actions/checkout@v4"
      with:
        submodules: true

    - name: Prepare java
      uses: actions/setup-java@v4
      with:
        distribution: "adopt"
        java-version: 11

    - name: "Restore Cache"
      uses: "actions/cache@v4"
      with:
        path: "~/.m2/repository"
        key: "${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}"
        restore-keys: "${{ runner.os }}-deps-"

    - name: Setup Clojure
      uses: DeLaGuardo/setup-clojure@13.4
      with:
        # pin versions to avoid GH API calls ("latest" resolution)
        # which hit "Bad credentials" or rate limits in CI right now
        # see https://github.com/DeLaGuardo/setup-clojure/issues/87
        cli: 1.12.4.1618
        bb: 1.12.218
        github-token: ''

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: npx on Windows
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        where npx
        bb -e '(babashka.process/shell "npx")'
        bb -e '(babashka.process/shell "npx -v")'

    - name: Run tests
      shell: bash
      run: |
        npx -v
        npm install
        bb test:node
        bb test:bb
        bb test:clj

    - name: Run library tests
      if: matrix.os != 'windows-latest'
      run: |
        npm install --global yarn
        bb test:libs
