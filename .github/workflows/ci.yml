name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: "Checkout code"
      uses: "actions/checkout@v5"
      with:
        submodules: true

    - name: Prepare java
      uses: actions/setup-java@v5
      with:
        distribution: "adopt"
        java-version: 25

    - name: "Restore Cache"
      uses: "actions/cache@v4"
      with:
        path: "~/.m2/repository"
        key: "${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}"
        restore-keys: "${{ runner.os }}-deps-"

    - name: Setup Clojure
      uses: DeLaGuardo/setup-clojure@13.6.1
      with:
        cli: latest
        bb: latest

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: 20

    - name: npx on Windows
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        where npx
        bb -e '(babashka.process/shell "npx")'
        bb -e '(babashka.process/shell "npx -v")'

    - name: Run tests
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        npx -v
        npm install
        bb test:node
        bb test:bb
        bb test:clj

    # retried once: Windows runners sometimes kill a spawned process at
    # startup with STATUS_DLL_INIT_FAILED (exit -1073741502)
    - name: Run tests (Windows, retried once)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        npx -v
        npm install
        run_tests() { bb test:node && bb test:bb && bb test:clj; }
        run_tests || { echo "Retrying after transient Windows failure"; run_tests; }

    - name: Run library tests
      if: matrix.os != 'windows-latest'
      run: |
        npm install --global yarn
        bb test:libs

    - name: Cache Playwright browsers
      if: matrix.os == 'ubuntu-latest'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
        restore-keys: ${{ runner.os }}-playwright-

    - name: Run e2e tests
      if: matrix.os == 'ubuntu-latest'
      run: |
        npm --prefix examples/browser-repl install
        npx playwright install --with-deps chromium
        bb test:e2e --vite 5 --vite 6 --vite 7 --vite 8
